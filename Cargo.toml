[workspace]
resolver = "2"
members = [
    "utils",
    "recipes",
    "ingredients/*"
]

[workspace.dependencies]
# Solana dependencies
solana-sdk = "3.0.0"
solana-client = "3.1.6"
solana-transaction-status-client-types = "3.1.6"

# SPL dependencies
spl-token-2022 = "10.0.0"
spl-token-2022-interface = "2.1.0"
spl-token-client = "0.18.0"
spl-associated-token-account = "8.0.0"
spl-token-confidential-transfer-proof-generation = "0.5.1"
spl-token-confidential-transfer-proof-extraction = "0.5.1"

# Other dependencies
tokio = { version = "1.42.0", features = ["full"] }
serde = "1.0.215"
serde_json = "1.0.1"
bs58 = "0.5.1"
dotenvy = "0.15.7"
google-cloud-kms = "0.6.0"
base64 = "0.22.1"
jito-sdk-rust = "0.1.0"
